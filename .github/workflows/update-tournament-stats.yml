name: Update Player Tournament Stats

on:
  # Run every 15 minutes to catch matches shortly after completion
  schedule:
    - cron: '*/15 * * * *'
  # Also allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    name: Process FIFA match events and update player stats
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run player stats updater
        run: python3 update-player-stats.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet squad-data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add squad-data.json
          git commit -m "Update player tournament statistics from FIFA API

- Process completed match events
- Update goals, assists, bookings counts
- Refresh appearance tracking
- Auto-generated by GitHub Actions"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ Squad data is current, no changes needed"
